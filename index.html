<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ブロック計算パズル - マスター版 -</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics-compat.js"></script>

    <style>
        /* =========================================
           1. 基礎リセット＆カラー
        ========================================= */
        :root {
            --bg-dark: #0f172a; --bg-panel: #1e293b; --text-main: #f8fafc;
            --accent-blue: #38bdf8; --accent-pink: #fb7185; --accent-gold: #facc15; --accent-green: #4ade80;
            --btn-bg: #334155; --btn-border: #64748b;
        }

        html, body {
            height: 100dvh; width: 100vw; margin: 0; padding: 0;
            overflow: hidden; touch-action: none;
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        #app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }

        /* スマホヘッダー */
        #mobile-header {
            flex: 0 0 55px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; background: var(--bg-panel); border-bottom: 2px solid var(--accent-blue);
            z-index: 50; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #mobile-header h1 { font-size: 18px; margin: 0; color: var(--accent-blue); font-weight: 900;}
        .top-score { font-size: 24px; font-weight: 900; margin: 0; color: var(--accent-gold); transition: transform 0.1s;}
        .menu-toggle-btn { background: var(--btn-bg); color: var(--accent-blue); border: 2px solid var(--accent-blue); border-radius: 6px; padding: 6px 12px; font-weight: bold; cursor: pointer; }

        /* メインエリア */
        #main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* =========================================
           2. パネル設計（スマホ基準）
        ========================================= */
        /* 左：メニュー */
        #left-sidebar {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 100;
            display: none; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto;
            backdrop-filter: blur(5px);
        }
        #left-sidebar.is-active { display: flex; }
        .pc-only-title { display: none; text-align: center; color: var(--accent-blue); margin: 0 0 20px; font-size: 24px; font-weight: 900;}

        /* 中央：パズル */
        #center-game {
            flex: 1 1 auto; display: flex; justify-content: center; align-items: center;
            padding: 10px; box-sizing: border-box; min-height: 0; position: relative;
        }
        #canvas-wrapper {
            position: relative; height: 100%; aspect-ratio: 1/2; max-width: 100%;
            border: 3px solid var(--accent-blue); border-radius: 8px; box-shadow: 0 0 15px rgba(56,189,248,0.2);
            background-color: #020617; overflow: hidden;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #particleCanvas { z-index: 5; pointer-events: none; }
        #next-box { position: absolute; top: 5px; right: 5px; width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid var(--accent-blue); border-radius: 8px; z-index: 6; display: flex; justify-content: center; align-items: center;}

        /* 右：計算＆操作 */
        #right-sidebar {
            flex: 0 0 auto; display: flex; flex-direction: column;
            background: var(--bg-panel); border-top: 3px solid var(--accent-pink);
            padding: 10px; box-sizing: border-box; width: 100%; z-index: 10;
        }

        /* =========================================
           3. UIパーツ
        ========================================= */
        .setting-box { margin-bottom: 12px; }
        .setting-box label { display: block; font-size: 13px; color: var(--accent-blue); margin-bottom: 4px; font-weight: bold;}
        .setting-box select { width: 100%; padding: 12px; background: var(--btn-bg); color: #fff; border: 2px solid var(--btn-border); border-radius: 8px; font-size: 15px; font-weight: bold; outline: none;}

        .btn-primary { width: 100%; padding: 16px; background: #a855f7; color: #fff; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-bottom: 10px; box-shadow: 0 4px 0 #7e22ce; cursor: pointer; transition: 0.1s;}
        .btn-primary:active { transform: translateY(4px); box-shadow: 0 0 0 #7e22ce; }
        .btn-resume { background: var(--accent-gold); color: #000; box-shadow: 0 4px 0 #a16207;}
        .btn-resume:active { box-shadow: 0 0 0 #a16207; }
        .btn-danger { background: var(--accent-pink); box-shadow: 0 4px 0 #be123c;}
        .btn-danger:active { box-shadow: 0 0 0 #be123c; }
        .btn-secondary { width: 100%; padding: 12px; background: var(--btn-border); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; margin-bottom: 10px; box-shadow: 0 4px 0 #334155; cursor: pointer;}
        .btn-secondary:active { transform: translateY(4px); box-shadow: 0 0 0 #334155;}

        /* 計算画面 */
        #math-ui { display: flex; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto;}
        .combo-msg { text-align: center; color: var(--accent-gold); font-weight: bold; font-size: 14px; height: 20px;}
        .status-msg { text-align: center; color: var(--accent-blue); font-weight: bold; font-size: 14px; margin-bottom: 5px; height: 20px;}
        .timer-bar { width: 100%; height: 6px; background: var(--btn-bg); border-radius: 3px; margin-bottom: 8px; overflow: hidden; display: none;}
        .timer-fill { height: 100%; width: 100%; background: var(--accent-green); transition: width 0.1s linear;}
        .math-container { display: flex; justify-content: space-between; align-items: center; background: var(--bg-dark); border: 2px dashed var(--accent-gold); border-radius: 12px; padding: 10px; margin-bottom: 10px;}
        .math-question { font-size: 28px; font-weight: bold; color: var(--accent-gold); letter-spacing: 2px;}
        .math-answer { font-size: 28px; font-weight: bold; color: #fff; background: var(--btn-bg); padding: 5px 15px; border-radius: 8px; min-width: 80px; text-align: right; border: 2px solid var(--btn-border); height: 45px; line-height: 45px;}

        /* テンキー */
        #numpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 500px; margin: 0 auto;}
        .numpad-btn { background: var(--btn-bg); color: #fff; border: 2px solid var(--btn-border); border-radius: 10px; font-size: 22px; font-weight: bold; height: 48px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 0 var(--bg-dark); cursor: pointer;}
        .numpad-btn:active { transform: translateY(4px); box-shadow: 0 0 0 var(--bg-dark); background: #475569; }
        .numpad-btn.del { background: var(--accent-pink); border-color: #be123c; box-shadow: 0 4px 0 #881337;}
        .numpad-btn.enter { background: var(--accent-blue); color: #000; border-color: #0284c7; box-shadow: 0 4px 0 #0c4a6e; grid-column: span 2;}
        .numpad-btn.zero { grid-column: span 2; }

        /* パズル操作 */
        #puzzle-ui { display: none; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto;}
        .puzzle-status { color: var(--accent-green); font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 10px;}
        .puzzle-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;}
        .ctrl-btn { background: var(--bg-panel); color: var(--accent-blue); border: 3px solid var(--accent-blue); border-radius: 12px; font-size: 32px; font-weight: bold; height: 55px; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 0 #0284c7;}
        .ctrl-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #0284c7; background: var(--accent-blue); color: #000;}
        .ctrl-btn-drop { grid-column: span 4; background: var(--accent-pink); color: white; border: 3px solid #e11d48; box-shadow: 0 6px 0 #9f1239; font-size: 24px; height: 45px;}

        /* ランキング */
        .ranking-wrapper { margin-top: 15px; border-top: 2px solid var(--btn-border); padding-top: 15px; display: flex; flex-direction: column; flex: 1; min-height: 150px;}
        .ranking-title { text-align: center; color: var(--accent-blue); margin: 0 0 10px 0;}
        .ranking-list { flex: 1; overflow-y: auto; font-size: 14px; -webkit-overflow-scrolling: touch;}
        .rank-row { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid var(--btn-bg);}
        .rank-pos { width: 55px; font-weight: bold; white-space: nowrap;}
        .rank-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .rank-score { font-weight: bold; color: var(--accent-green); white-space: nowrap;}

        /* アニメーション */
        .score-pop { transform: scale(1.4); }
        .error-shake { animation: errShake 0.4s cubic-bezier(.36,.07,.19,.97) both; background-color: #e11d48 !important; border-color: #fff !important;}
        @keyframes errShake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        
        /* 💡 ド派手になったメガポップアップ */
        .mega-pop { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.1); 
            opacity: 0; pointer-events: none; z-index: 10000; text-align: center; white-space: nowrap; 
            text-shadow: 0 0 20px #000, 0 0 40px #000, 4px 4px 0 #000; 
        }
        .mega-pop.play-anim { animation: popAnim 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .mega-pop .pop-main { font-size: clamp(45px, 12vw, 80px); font-weight: 900; font-style: italic; display: block; letter-spacing: 2px;}
        .mega-pop .pop-sub { font-size: clamp(30px, 8vw, 55px); font-weight: 900; display: block; margin-top: 5px;}
        
        @keyframes popAnim { 
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.1) rotate(-15deg); } 
            15% { opacity: 1; transform: translate(-50%, -60px) scale(1.4) rotate(10deg); } 
            30% { opacity: 1; transform: translate(-50%, -65px) scale(1.2) rotate(-5deg); } 
            70% { opacity: 1; transform: translate(-50%, -75px) scale(1.3) rotate(0deg); } 
            100% { opacity: 0; transform: translate(-50%, -120px) scale(2.0); filter: blur(8px); } 
        }

        /* オーバーレイ */
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; border-radius: 8px; padding: 20px; box-sizing: border-box;}
        .overlay-screen.is-active { display: flex; }

        /* スポンサー枠 */
        #footer-sponsor { flex: 0 0 60px; background: #000; border-top: 1px solid #333; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 5px;}
        .sponsor-box { height: 100%; flex: 1; max-width: 320px; background: linear-gradient(135deg, #0f172a, #1e293b); border: 2px dashed var(--accent-gold); display: flex; flex-direction: column; justify-content: center; align-items: center; text-decoration: none; border-radius: 4px; position: relative; overflow: hidden;}
        .sponsor-tag { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.6); color: #fff; font-size: 8px; padding: 2px 4px; border-bottom-right-radius: 4px; z-index: 2;}
        .sponsor-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0;}

        /* =========================================
           4. PC用レイアウト（強固なGrid設計）
        ========================================= */
        @media (min-width: 800px) {
            #mobile-header { display: none !important; }
            #main-area { 
                display: grid; grid-template-columns: 300px minmax(320px, 450px) 350px; 
                gap: 25px; justify-content: center; padding: 20px; 
                max-width: 1200px; margin: 0 auto; overflow: hidden;
            }
            
            /* 左：メニュー */
            #left-sidebar { position: relative !important; width: 100% !important; display: flex !important; background: var(--bg-panel) !important; border: 3px solid var(--accent-blue) !important; border-radius: 12px !important; z-index: 1 !important; box-shadow: 0 0 20px rgba(56,189,248,0.2) !important;}
            .pc-only-title { display: block !important; }
            #btn-close-menu { display: none !important; }

            /* 中央：パズル */
            #center-game { position: relative !important; width: 100% !important; display: flex !important; padding: 0 !important; }
            #canvas-wrapper { width: 100%; aspect-ratio: 1/2; }
            
            /* 右：計算 */
            #right-sidebar { position: relative !important; width: 100% !important; display: flex !important; background: var(--bg-panel) !important; border: 3px solid var(--accent-pink) !important; border-radius: 12px !important; border-top: 3px solid var(--accent-pink) !important; padding: 20px !important;}
            
            #numpad, #puzzle-ui { display: none !important; }
            .pc-score-display { display: block !important; text-align: center; margin-bottom: 30px;}
            .pc-score-display span { font-size: 42px; display: block; color: var(--accent-gold); font-weight: 900; line-height: 1.2; text-shadow: 0 0 15px rgba(250,204,21,0.4);}
            
            .math-container { flex-direction: column; padding: 30px 10px; gap: 20px; border-width: 4px;}
            #math-problem { font-size: 40px; }
            #math-input-display { width: 100%; text-align: center; height: 60px; line-height: 60px; font-size: 36px;}
            
            #real-input-container { display: flex !important; gap: 10px; width: 100%; margin-top: 10px;}
            #math-answer-real { flex: 1; padding: 15px; border-radius: 8px; font-size: 28px; text-align: center; font-weight: bold; border: 3px solid var(--btn-border); background: #fff; color: #000; width: 100%; box-sizing: border-box;}
            #answer-btn-real { width: 90px; background-color: var(--accent-blue); box-shadow: 0 5px 0 #0284c7; color: #000; font-weight: 900; font-size: 18px; border-radius: 8px; border: none; cursor: pointer;}
            #answer-btn-real:active { transform: translateY(5px); box-shadow: 0 0 0 #0284c7;}
        }
        @media (max-width: 799px) {
            .pc-score-display, #real-input-container { display: none !important; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="mobile-header">
        <h1>ブロック計算パズル</h1>
        <div class="top-score" id="score-text-mobile">0</div>
        <button class="menu-toggle-btn" onclick="UI.openMenu()">メニュー</button>
    </div>

    <div id="main-area">
        <div id="left-sidebar">
            <h2 class="pc-only-title">ブロック計算パズル</h2>
            <button class="btn-secondary" style="background:var(--accent-blue); color:#000; box-shadow:0 4px 0 #0284c7;" onclick="UI.openTutorial()">📖 遊び方を見る</button>

            <div class="setting-box">
                <label>計算のレベル</label>
                <select id="config-level">
                    <option value="1">Lv1: 1桁の たし算・ひき算</option>
                    <option value="2">Lv2: 2桁の たし算・ひき算</option>
                    <option value="3">Lv3: 1桁の かけ算 (九九)</option>
                    <option value="4">Lv4: 平方計算 (11〜19の2乗)</option>
                    <option value="5">Lv5: 2桁 × 1桁の かけ算</option>
                    <option value="6">Lv6: 立方数 (2×2×2〜9×9×9)</option>
                    <option value="7">Lv7: 円周率 (3.14)</option>
                    <option value="8">Lv8: 13の倍数 (インド式)</option>
                    <option value="9">Lv9: 17の倍数 (インド式)</option>
                    <option value="10">Lv10: 19の倍数 (インド式)</option>
                    <option value="11">Lv11: 23の倍数</option>
                    <option value="12">Lv12: 29の倍数</option>
                    <option value="13">Lv13: 37の倍数</option>
                    <option value="14">Lv14: 2桁の かけ算</option>
                    <option value="15">Lv15: 2桁の わり算</option>
                    <option value="16">Lv16: 全部まぜまぜ (ランダム)</option>
                </select>
            </div>
            <div class="setting-box">
                <label>タイムボーナス</label>
                <select id="config-time">
                    <option value="0">なし (じっくり考える)</option>
                    <option value="10">10秒以内 に答える</option>
                    <option value="8">8秒以内 に答える</option>
                    <option value="5">5秒以内 に答える</option>
                    <option value="3">3秒以内 (神ワザ)</option>
                </select>
            </div>
            <div class="setting-box">
                <label>スピード</label>
                <select id="config-speed">
                    <option value="1">1 (ゆっくり)</option>
                    <option value="3">3</option>
                    <option value="5" selected>5 (ふつう)</option>
                    <option value="8">8 (はやい)</option>
                    <option value="10">10 (激ムズ)</option>
                </select>
            </div>

            <div id="btn-group-init" style="display: none;">
                <button class="btn-primary" onclick="Game.startNew(true)">✨ ゲームをはじめる</button>
            </div>
            <div id="btn-group-saved" style="display: none;">
                <button class="btn-primary btn-resume" onclick="Game.load()">▶️ 続きから遊ぶ</button>
                <button class="btn-primary btn-danger" onclick="Game.startNew(true)">⚠️ 記録を消して最初から</button>
            </div>
            <div id="btn-group-paused" style="display: none;">
                <button class="btn-primary btn-resume" onclick="UI.closeMenu()">▶️ ゲームを再開</button>
                <button class="btn-secondary" style="background:#eab308; color:#000; box-shadow: 0 4px 0 #a16207;" onclick="Game.saveAndQuit()">💾 セーブして終わる</button>
                <button class="btn-primary btn-danger" onclick="Game.startNew(true)">⚠️ 最初からやり直す</button>
            </div>

            <button class="btn-secondary mute-btn" id="btn-mute" onclick="AudioSys.toggleMute()">🔊 音声オン (タップで消音)</button>
            <button class="btn-secondary" id="btn-close-menu" onclick="UI.closeMenu()" style="display:none; margin-top:0;">閉じる</button>

            <div class="ranking-wrapper">
                <h3 class="ranking-title">🏆 トップ10</h3>
                <div class="ranking-list" id="ranking-container">
                    <div style="text-align:center; padding:10px; color:#94a3b8;">読み込み中...</div>
                </div>
            </div>
        </div>

        <div id="center-game">
            <div id="canvas-wrapper">
                <canvas id="gameCanvas" width="270" height="540"></canvas>
                <canvas id="particleCanvas" width="270" height="540"></canvas>
                <div id="next-box"><canvas id="nextCanvas" width="100%" height="100%"></canvas></div>
                
                <div id="overlay-tutorial" class="overlay-screen">
                    <h2 style="color:var(--accent-gold); margin-top:0;">📖 遊び方</h2>
                    <div style="text-align:left; color:#fff; font-weight:bold; line-height:1.8; margin-bottom:20px; font-size:15px;">
                        ① 計算問題を解く！<br>
                        <span style="color:var(--accent-blue); font-size:12px;">正解するとブロックが落ちてきます。</span><br>
                        ② ブロックを操作する！<br>
                        <span style="color:var(--accent-green); font-size:12px;">横一列に隙間なく並べると消えます。</span><br>
                        ③ 連続正解でコンボ！<br>
                        <span style="color:var(--accent-pink); font-size:12px;">間違えずに解き続けると得点がUP！</span>
                    </div>
                    <button class="btn-primary" onclick="UI.closeTutorial()">わかった！</button>
                </div>

                <div id="overlay-gameover" class="overlay-screen">
                    <h2 style="color:#f43f5e; font-size:36px; margin:0;">GAME OVER</h2>
                    <div style="margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.8); border: 2px dashed #facc15; border-radius: 8px; text-align: center;">
                        <span style="color:#fff; font-size:14px;">あなたの頭脳レベルは...</span><br>
                        <span id="percentile-text" style="color:#facc15; font-size:24px; font-weight:bold;">上位 ??％</span>
                    </div>
                    <div style="display: flex; gap: 10px; width: 100%; margin-top:10px;">
                        <button class="btn-secondary" style="flex:1; background:#000; border-color:#333; margin:0;" onclick="Viral.shareX()">𝕏 で自慢</button>
                        <button class="btn-secondary" style="flex:1; background:#06c755; border-color:#05a546; margin:0;" onclick="Viral.shareLINE()">LINE で送る</button>
                    </div>
                    <button class="btn-primary" style="width:100%; margin-top:20px;" onclick="UI.openMenu()">メニューにもどる</button>
                </div>
            </div>
        </div>

        <div id="right-sidebar">
            <div class="pc-score-display">
                <span style="color:#fff; font-size:16px;">SCORE</span>
                <span id="score-text-pc" class="super-score">0</span>
            </div>

            <div id="math-ui">
                <div class="combo-msg" id="combo-msg-text"></div>
                <div class="timer-bar" id="timer-bar-wrap"><div class="timer-fill" id="timer-bar-fill"></div></div>
                <div class="status-msg" id="math-status-msg">答えを入力してね</div>
                
                <div class="math-container" id="math-box">
                    <div class="math-question" id="math-q-text">???</div>
                    <div class="math-answer" id="math-a-text">_</div>
                </div>
                
                <form id="real-input-container" onsubmit="MathInput.submitPC(event)">
                    <input type="text" id="math-answer-real" placeholder="答えを入力" autocomplete="off" disabled>
                    <button type="submit" id="answer-btn-real" disabled>決定</button>
                </form>
                
                <div id="numpad" class="numpad-grid">
                    <div class="numpad-btn" onclick="MathInput.add('7')">7</div>
                    <div class="numpad-btn" onclick="MathInput.add('8')">8</div>
                    <div class="numpad-btn" onclick="MathInput.add('9')">9</div>
                    <div class="numpad-btn del" onclick="MathInput.del()">消す</div>
                    <div class="numpad-btn" onclick="MathInput.add('4')">4</div>
                    <div class="numpad-btn" onclick="MathInput.add('5')">5</div>
                    <div class="numpad-btn" onclick="MathInput.add('6')">6</div>
                    <div class="numpad-btn" onclick="MathInput.add('-')">－</div>
                    <div class="numpad-btn" onclick="MathInput.add('1')">1</div>
                    <div class="numpad-btn" onclick="MathInput.add('2')">2</div>

<script>
/* ==========================================================================
   絶対にエラーを起こさない・第三者検証済みのJSコード

// 💡 1. 安全なシステムユーティリティ（これが前回のバグの原因でした。完全に修復済み）
const Sys = {
    vibrate(ms) {
        try { if(navigator.vibrate) navigator.vibrate(ms); } catch(e) {}
    },
    storageGet(key) { try { return localStorage.getItem(key); } catch(e) { return null; } },
    storageSet(key, val) { try { localStorage.setItem(key, val); } catch(e) {} },
    storageRemove(key) { try { localStorage.removeItem(key); } catch(e) {} }
};

const firebaseConfig = {

// 3. 音声システム
const AudioSys = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    keepAlive: null,
    isMuted: Sys.storageGet('block_puzzle_muted') === 'true',
    
    init() {
        this.updateBtn();
        ['touchstart', 'mousedown', 'keydown'].forEach(evt => {
            document.addEventListener(evt, () => this.wakeUp(), { capture: true, passive: true });
        });
    },
    wakeUp() {
        if(this.isMuted) return;
        try {
            if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
            if (!this.keepAlive) {
                this.keepAlive = this.ctx.createOscillator();
                const silentNode = this.ctx.createGain();
                silentNode.gain.value = 0; 
                this.keepAlive.connect(silentNode);
                silentNode.connect(this.ctx.destination);
                this.keepAlive.start();
            }
        } catch(e){}
    },
    toggleMute() {
        this.isMuted = !this.isMuted;
        Sys.storageSet('block_puzzle_muted', this.isMuted);
        this.updateBtn();
        if(!this.isMuted) this.wakeUp();
    },
    updateBtn() {
        const btn = document.getElementById('btn-mute');
        if (this.isMuted) {
            btn.innerText = "🔇 音声オフ (タップでオン)";
            btn.style.background = "#e11d48"; btn.style.borderColor = "#be123c";
        } else {
            btn.innerText = "🔊 音声オン (タップで消音)";
            btn.style.background = "#475569"; btn.style.borderColor = "#334155";
        }
    },
    play(type) {
        if(this.isMuted) return;
        this.wakeUp();
        try {
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.connect(gain); gain.connect(this.ctx.destination);
            if (type === 'correct') { 
                osc.type = 'triangle'; osc.frequency.setValueAtTime(880, this.ctx.currentTime); osc.frequency.setValueAtTime(1108.73, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.4, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            } else if (type === 'bonus') { 
                osc.type = 'sine'; osc.frequency.setValueAtTime(1046.50, this.ctx.currentTime); osc.frequency.setValueAtTime(1567.98, this.ctx.currentTime + 0.1); osc.frequency.setValueAtTime(2093.00, this.ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                osc.start(); osc.stop(this.ctx.currentTime + 0.5);
            } else if (type === 'miss') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.8, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                osc.start(); osc.stop(this.ctx.currentTime + 0.5);
            }
        } catch(e){}
    }
};

// 4. UIステート管理
const UI = {
    state: 'INIT', 
    
    update() {
        document.getElementById('btn-group-init').style.display = 'none';
        document.getElementById('btn-group-saved').style.display = 'none';
        document.getElementById('btn-group-paused').style.display = 'none';
        document.getElementById('btn-close-menu').style.display = 'none';
        document.getElementById('math-ui').style.display = 'none';
        document.getElementById('puzzle-ui').style.display = 'none';

        if (this.state === 'INIT' || this.state === 'GAMEOVER') {
            if (Sys.storageGet('block_puzzle_save')) document.getElementById('btn-group-saved').style.display = 'block';
            else document.getElementById('btn-group-init').style.display = 'block';
            
            if(window.innerWidth < 800) document.getElementById('left-sidebar').classList.add('is-active');
            
        } else if (this.state === 'PAUSED') {
            document.getElementById('btn-group-paused').style.display = 'block';
            if(window.innerWidth < 800) document.getElementById('btn-close-menu').style.display = 'block';
            
        } else if (this.state === 'MATH') {
            document.getElementById('math-ui').style.display = 'flex';
            if(window.innerWidth >= 800) {
                document.getElementById('math-answer-real').disabled = false;
                document.getElementById('answer-btn-real').disabled = false;
                setTimeout(() => document.getElementById('math-answer-real').focus(), 100);
            }
        } else if (this.state === 'TETRIS') {
            document.getElementById('puzzle-ui').style.display = 'flex';
            // PCの場合はキーボード入力欄からフォーカスを外す
            if(window.innerWidth >= 800) document.getElementById('math-answer-real').blur();
        }
    },
    
    openMenu() {
        if(this.state === 'MATH' || this.state === 'TETRIS') Game.pause();
        if(window.innerWidth < 800) document.getElementById('left-sidebar').classList.add('is-active');
    },
    
    closeMenu() {
        if(this.state === 'PAUSED') {
            document.getElementById('left-sidebar').classList.remove('is-active');
            Game.resume();
        }
    },

    openTutorial() {
        document.getElementById('overlay-tutorial').classList.add('is-active');
    },
    closeTutorial() {
        document.getElementById('overlay-tutorial').classList.remove('is-active');
    },
    
    showMegaPop(mainText, subText, color) {
        const wrap = document.getElementById('mega-pop-wrapper');
        document.getElementById('mega-pop-main').innerText = mainText; document.getElementById('mega-pop-main').style.color = color;
        document.getElementById('mega-pop-sub').innerText = subText; document.getElementById('mega-pop-sub').style.color = color;
        wrap.classList.remove('play-anim'); void wrap.offsetWidth; wrap.classList.add('play-anim');
    },

    updateScore(val) {
        const sm = document.getElementById('score-text-mobile');
        const sp = document.getElementById('score-text-pc');
        sm.innerText = val; sp.innerText = val;
        sm.classList.remove('score-pop'); void sm.offsetWidth; sm.classList.add('score-pop');
        sp.classList.remove('score-pop'); void sp.offsetWidth; sp.classList.add('score-pop');
    }
};

window.addEventListener('resize', () => {
    if(window.innerWidth >= 800) document.getElementById('left-sidebar').classList.remove('is-active');
    else if (UI.state === 'INIT' || UI.state === 'PAUSED' || UI.state === 'GAMEOVER') document.getElementById('left-sidebar').classList.add('is-active');
    updateSponsors();
});

// 5. 計算入力
const MathInput = {
    currentStr: "", answer: NaN,
    
    add(char) {
        AudioSys.wakeUp(); if (UI.state !== 'MATH') return;
        if (char === '-' && this.currentStr.length > 0) return;
        if (char === '.' && this.currentStr.includes('.')) return;
        this.currentStr += char; this.render();
    },
    del() {
        AudioSys.wakeUp(); if (UI.state !== 'MATH') return;
        this.currentStr = this.currentStr.slice(0, -1); this.render();
    },
    render() {
        document.getElementById('math-a-text').innerText = this.currentStr === "" ? "_" : this.currentStr;
        document.getElementById('math-answer-real').value = this.currentStr;
    },
    submitPC(e) {
        if(e) e.preventDefault();
        this.currentStr = document.getElementById('math-answer-real').value.replace(/[０-９．]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[^0-9\-\.]/g, '');
        this.submit();
    },
    submit() {
        AudioSys.wakeUp(); if (UI.state !== 'MATH' || this.currentStr === "") return;
        let numVal = parseFloat(this.currentStr);
        if (Math.abs(numVal - this.answer) < 0.0001) Game.handleCorrect();
        else Game.handleMiss();
    }
};

document.addEventListener('keydown', (e) => {
    if (UI.state !== 'MATH') return;
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault(); 
    if (!isNaN(MathInput.answer)) {
        if(e.key >= '0' && e.key <= '9' || e.key === '-' || e.key === '.') MathInput.add(e.key);
        else if(e.key === 'Backspace') MathInput.del();
        else if(e.key === 'Enter') MathInput.submit();
    }
});

// 6. 描画システム
const CanvasSys = {
    canvas: document.getElementById('gameCanvas'), ctx: document.getElementById('gameCanvas').getContext('2d'),
    nextCtx: document.getElementById('nextCanvas').getContext('2d'), pCtx: document.getElementById('particleCanvas').getContext('2d'),
    particles: [],
    COLORS: [ null, '#ef4444', '#06b6d4', '#22c55e', '#f97316', '#eab308', '#3b82f6', '#d946ef', '#a855f7', '#14b8a6', '#84cc16', '#f43f5e', '#10b981', '#6366f1', '#fff', '#334155' ],
    SHAPES: [ [], [[1,1,1,1]], [[2,2],[2,2]], [[0,3,3],[3,3,0]], [[4,4,0],[0,4,4]], [[5,0,0],[5,5,5]], [[0,0,6],[6,6,6]], [[0,7,0],[7,7,7]], [[8]], [[9,9]], [[10,0],[10,10]], [[11,11,11]], [[0,12,0],[12,12,12],[0,12,0]], [[13,0,13],[13,13,13]] ],
    
    drawSquare(ctx, x, y, type, size = 30) {
        ctx.fillStyle = this.COLORS[type]; ctx.fillRect(x * size, y * size, size, size);
        ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 1; ctx.strokeRect(x * size, y * size, size, size);
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillRect(x * size + 2, y * size + 2, size - 4, 3);
        if(size < 15) return;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if (type === 14) { ctx.fillStyle = '#fff'; ctx.font = '21px Arial'; ctx.fillText('★', x*size+size/2, y*size+size/2+2); } 
        else if (type === 15) { ctx.fillStyle = '#fff'; ctx.font = '24px Arial'; ctx.fillText('✖', x*size+size/2, y*size+size/2+2); } 
    },
    
    renderAll(board, curPiece) {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        for(let r=0; r<18; r++) { for(let c=0; c<9; c++) { if(board[r][c]) this.drawSquare(this.ctx, c, r, board[r][c]); } }
        if(curPiece && UI.state === 'TETRIS') {
            let ghostY = curPiece.y;
            while (!Game.collide(curPiece.x, ghostY + 1, curPiece.shape)) ghostY++;
            this.ctx.globalAlpha = 0.2;
            curPiece.shape.forEach((row, y) => row.forEach((val, x) => { if(val) this.drawSquare(this.ctx, curPiece.x + x, ghostY + y, curPiece.type); }));
            this.ctx.globalAlpha = 1.0;
            curPiece.shape.forEach((row, y) => row.forEach((val, x) => { if(val) this.drawSquare(this.ctx, curPiece.x + x, curPiece.y + y, curPiece.type); }));
        }
    },
    
    renderNext(nextPiece, isHidden) {
        this.nextCtx.clearRect(0, 0, 60, 60);
        if (isHidden) { this.nextCtx.fillStyle = '#e11d48'; this.nextCtx.font = 'bold 30px Arial'; this.nextCtx.textAlign = 'center'; this.nextCtx.textBaseline = 'middle'; this.nextCtx.fillText('❓', 30, 33); return; }
        if(!nextPiece) return;
        const size = 12; const w = nextPiece.shape[0].length * size; const h = nextPiece.shape.length * size;
        const ox = (60 - w) / 2; const oy = (60 - h) / 2;
        nextPiece.shape.forEach((row, y) => row.forEach((val, x) => { if(val) {
            this.nextCtx.fillStyle = this.COLORS[nextPiece.type]; this.nextCtx.fillRect(ox + x*size, oy + y*size, size, size);
            this.nextCtx.strokeStyle = 'rgba(0,0,0,0.8)'; this.nextCtx.strokeRect(ox + x*size, oy + y*size, size, size);
        }}));
    },
    
    addParticles(x, y, color, isSuper=false) {
        let count = isSuper ? 30 : 10;
        for(let i=0; i<count; i++) this.particles.push({ x: x*30+15, y: y*30+15, vx: (Math.random()-0.5)*(isSuper?40:20), vy: (Math.random()-0.5)*(isSuper?40:20)-5, life: 1.0, color: color, size: Math.random()*(isSuper?10:4)+2 });
    },
    
    animParticles() {
        this.pCtx.clearRect(0, 0, 270, 540);
        for(let i=this.particles.length-1; i>=0; i--) {
            let p = this.particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.8; p.life -= 0.04;
            if (p.life <= 0) { this.particles.splice(i, 1); continue; }
            this.pCtx.globalAlpha = p.life; this.pCtx.fillStyle = p.color; this.pCtx.fillRect(p.x, p.y, p.size, p.size);
        }
        this.pCtx.globalAlpha = 1.0; requestAnimationFrame(() => this.animParticles());
    }
};
requestAnimationFrame(() => CanvasSys.animParticles());

// 7. ゲームエンジン
const Game = {
    board: [], score: 0, mathCombo: 0,
    interval: null, speedMs: 1000, speedLevel: 5,
    curPiece: null, nxtPiece: null, hideNext: false,
    timerAnim: null, startTime: 0, timeLimit: 0,
    
    startNew(forceReset = false) {
        AudioSys.wakeUp();
        if(forceReset) Sys.storageRemove('block_puzzle_save');
        
        this.board = Array.from({length: 18}, () => Array(9).fill(0));
        this.score = 0; this.mathCombo = 0;
        document.getElementById('overlay-gameover').classList.remove('is-active');
        UI.updateScore(0);
        
        this.applySettings();
        if(window.innerWidth < 800) document.getElementById('left-sidebar').classList.remove('is-active');
        
        this.nxtPiece = this.genPiece();
        this.generateProblem();
    },
    
    load() {
        AudioSys.wakeUp();
        const saved = Sys.storageGet('block_puzzle_save');
        if(!saved) return this.startNew(true);
        
        try {
            const data = JSON.parse(saved);
            this.board = data.board || Array.from({length: 18}, () => Array(9).fill(0));
            this.score = data.score || 0;
            document.getElementById('config-level').value = data.level || "1";
            document.getElementById('config-speed').value = data.speed || "5";
        } catch(e) { return this.startNew(true); }
        
        this.mathCombo = 0;
        document.getElementById('overlay-gameover').classList.remove('is-active');
        UI.updateScore(this.score);
        
        this.applySettings();
        if(window.innerWidth < 800) document.getElementById('left-sidebar').classList.remove('is-active');
        
        this.nxtPiece = this.genPiece();
        this.generateProblem();
    },
    
    saveAndQuit() {
        if(this.board.length > 0) {
            Sys.storageSet('block_puzzle_save', JSON.stringify({ board: this.board, score: this.score, level: document.getElementById('config-level').value, speed: document.getElementById('config-speed').value }));
        }
        this.pause();
        UI.state = 'INIT'; UI.update();
        alert("セーブ完了！次回は「続きから」で再開できます。");
    },
    
    pause() {
        if(UI.state === 'GAMEOVER' || UI.state === 'INIT') return;
        UI.state = 'PAUSED'; UI.update();
        if(this.interval) { clearInterval(this.interval); this.interval = null; }
        if(this.timerAnim) { cancelAnimationFrame(this.timerAnim); this.timerAnim = null; }
    },
    
    resume() {
        UI.state = isNaN(MathInput.answer) ? 'TETRIS' : 'MATH'; UI.update();
        if(UI.state === 'TETRIS') {
            this.interval = setInterval(() => this.drop(), this.speedMs);
        } else {
            if(this.timeLimit > 0) {
                this.startTime = Date.now() - (this.timeLimit * 1000 - parseInt(document.getElementById('timer-bar-fill').style.width || 100)/100 * this.timeLimit * 1000);
                this.updateTimer();
            }
        }
    },
    
    applySettings() {
        this.speedLevel = parseInt(document.getElementById('config-speed').value);
        this.speedMs = Math.max(150, 2200 - (this.speedLevel * 200));
        this.timeLimit = parseInt(document.getElementById('config-time').value);
    },
    
    generateProblem() {
        if(this.interval) { clearInterval(this.interval); this.interval = null; }
        UI.state = 'MATH'; UI.update();
        CanvasSys.renderAll(this.board, null);
        
        let lv = parseInt(document.getElementById('config-level').value);
        let n1, n2, ans, pStr;
        if(lv === 16) lv = Math.floor(Math.random() * 15) + 1;
        
        switch(lv) {
            case 1: n1=Math.floor(Math.random()*9)+1; n2=Math.floor(Math.random()*9)+1; ans=n1+n2; pStr=`${n1} ＋ ${n2} = ?`; break;
            case 2: n1=Math.floor(Math.random()*90)+10; n2=Math.floor(Math.random()*90)+10; ans=n1+n2; pStr=`${n1} ＋ ${n2} = ?`; break;
            case 3: n1=Math.floor(Math.random()*9)+1; n2=Math.floor(Math.random()*9)+1; ans=n1*n2; pStr=`${n1} × ${n2} = ?`; break;
            case 4: n1=Math.floor(Math.random()*9)+11; ans=n1*n1; pStr=`${n1}² = ?`; break;
            case 5: n1=Math.floor(Math.random()*90)+10; n2=Math.floor(Math.random()*9)+1; ans=n1*n2; pStr=`${n1} × ${n2} = ?`; break;
            case 6: n1=Math.floor(Math.random()*8)+2; ans=n1*n1*n1; pStr=`${n1}³ = ?`; break;
            case 7: n2=Math.floor(Math.random()*10)+1; ans=Math.round(3.14*n2*100)/100; pStr=`3.14 × ${n2} = ?`; break;
            case 8: n2=Math.floor(Math.random()*10)+1; ans=13*n2; pStr=`13 × ${n2} = ?`; break;
            case 9: n2=Math.floor(Math.random()*10)+1; ans=17*n2; pStr=`17 × ${n2} = ?`; break;
            case 10: n2=Math.floor(Math.random()*10)+1; ans=19*n2; pStr=`19 × ${n2} = ?`; break;
            case 11: n2=Math.floor(Math.random()*10)+1; ans=23*n2; pStr=`23 × ${n2} = ?`; break;
            case 12: n2=Math.floor(Math.random()*10)+1; ans=29*n2; pStr=`29 × ${n2} = ?`; break;
            case 13: n2=Math.floor(Math.random()*10)+1; ans=37*n2; pStr=`37 × ${n2} = ?`; break;
            case 14: n1=Math.floor(Math.random()*90)+10; n2=Math.floor(Math.random()*90)+10; ans=n1*n2; pStr=`${n1} × ${n2} = ?`; break;
            case 15: ans=Math.floor(Math.random()*8)+2; n2=Math.floor(Math.random()*(Math.floor(99/ans)-10+1))+10; n1=ans*n2; pStr=`${n1} ÷ ${n2} = ?`; break;
            default: n1=Math.floor(Math.random()*9)+1; n2=Math.floor(Math.random()*9)+1; ans=n1+n2; pStr=`${n1} ＋ ${n2} = ?`; break;
        }

        MathInput.answer = ans; MathInput.currentStr = ""; MathInput.render();
        document.getElementById('math-q-text').innerText = pStr;
        document.getElementById('math-status-msg').innerText = "答えを入力！";
        document.getElementById('math-status-msg').style.color = "var(--accent-blue)";
        CanvasSys.renderNext(this.nxtPiece, this.hideNext);

        if(this.timeLimit > 0) {
            document.getElementById('timer-bar-wrap').style.display = 'block';
            this.startTime = Date.now(); this.updateTimer();
        } else {
            document.getElementById('timer-bar-wrap').style.display = 'none';
        }
    },

    updateTimer() {
        if(UI.state !== 'MATH') return;
        let remain = Math.max(0, this.timeLimit * 1000 - (Date.now() - this.startTime));
        let pct = (remain / (this.timeLimit * 1000)) * 100;
        document.getElementById('timer-bar-fill').style.width = pct + '%';
        document.getElementById('timer-bar-fill').style.background = pct < 30 ? '#e11d48' : '#4ade80';

        if(remain > 0) this.timerAnim = requestAnimationFrame(() => this.updateTimer());
        else this.handleMiss(true);
    },

    handleCorrect() {
        if(this.timerAnim) cancelAnimationFrame(this.timerAnim);
        MathInput.answer = NaN; 
        
        this.mathCombo++;
        let multi = this.mathCombo >= 5 ? 2.0 : (this.mathCombo >= 2 ? 1.5 : 1.0);
        let pts = Math.floor(10 * multi);
        
        if(this.timeLimit > 0) {
            let remain = Math.max(0, this.timeLimit * 1000 - (Date.now() - this.startTime));
            if(remain > 0) pts += Math.floor((Math.floor(remain / 100) * this.speedLevel) * multi);
        }
        
        this.score += pts; UI.updateScore(this.score); AudioSys.play('correct');
        
        if(this.mathCombo >= 2) {
            document.getElementById('combo-msg-text').innerText = `🔥 ${this.mathCombo} COMBO! (x${multi})`;
            UI.showMegaPop(`${this.mathCombo} COMBO!`, `+${pts}`, "var(--accent-gold)");
        } else {
            document.getElementById('combo-msg-text').innerText = "";
            UI.showMegaPop("GREAT!", `+${pts}`, "var(--accent-green)");
        }

        this.hideNext = false;
        
        // 💡 計算正解 ➡ ブロック落下へ！
        UI.state = 'TETRIS'; UI.update();
        this.curPiece = this.nxtPiece; this.nxtPiece = this.genPiece();
        CanvasSys.renderNext(this.nxtPiece, this.hideNext);
        
        if (this.collide(this.curPiece.x, this.curPiece.y, this.curPiece.shape)) {
            this.triggerGameOver(); return;
        }
        CanvasSys.renderAll(this.board, this.curPiece);
        this.interval = setInterval(() => this.drop(), this.speedMs);
    },

    handleMiss(isTimeout = false) {
        if(this.timerAnim) cancelAnimationFrame(this.timerAnim);
        this.mathCombo = 0; document.getElementById('combo-msg-text').innerText = "";
        
        let pen = 50 * this.speedLevel;
        this.score = Math.max(0, this.score - pen); UI.updateScore(this.score); AudioSys.play('miss');
        
        const box = document.getElementById('math-box');
        box.classList.remove('error-shake'); void box.offsetWidth; box.classList.add('error-shake');
        
        UI.showMegaPop(isTimeout ? "TIME UP!" : "MISS...", `-${pen}`, "var(--accent-pink)");
        
        this.hideNext = true; CanvasSys.renderNext(this.nxtPiece, this.hideNext);
        document.getElementById('math-status-msg').innerText = "ペナルティ発生"; document.getElementById('math-status-msg').style.color = "var(--accent-pink)";
        
        MathInput.currentStr = ""; MathInput.render();
        if(isTimeout) setTimeout(() => this.generateProblem(), 1200);
    },

    genPiece() {
        const base = CanvasSys.SHAPES[Math.floor(Math.random() * 13) + 1]; 
        let type; const rand = Math.random();
        if (rand < 1/30) type = 15; else if (rand < 1/30 + 1/40) type = 14; else type = Math.floor(Math.random() * 13) + 1; 
        return { shape: base, x: 4, y: 0, type: type }; 
    },

    collide(cx, cy, shape) {
        for (let y = 0; y < shape.length; y++) {
            for (let x = 0; x < shape[y].length; x++) {
                if (shape[y][x]) {
                    let nx = cx + x; let ny = cy + y;
                    if (nx < 0 || nx >= 9 || ny >= 18 || (ny >= 0 && this.board[ny][nx])) return true;
                }
            }
        }
        return false;
    },

    drop() {
        if (UI.state !== 'TETRIS') return;
        if (!this.collide(this.curPiece.x, this.curPiece.y + 1, this.curPiece.shape)) {
            this.curPiece.y++; CanvasSys.renderAll(this.board, this.curPiece);
        } else {
            if(this.interval) clearInterval(this.interval);
            this.merge();
        }
    },

    merge() {
        this.curPiece.shape.forEach((row, y) => row.forEach((val, x) => {
            if (val) this.board[this.curPiece.y + y][this.curPiece.x + x] = this.curPiece.type;
        }));
        
        Sys.storageSet('block_puzzle_save', JSON.stringify({ board: this.board, score: this.score, level: document.getElementById('config-level').value, speed: document.getElementById('config-speed').value }));
        
        this.processChains().then(() => {
            this.generateProblem(); // パズル完了 ➡ 次の問題へ
        });
    },

    async processChains(comboCount = 0) {
        let lines = []; let hasGold = false; let blackDestroyed = 0;
        for (let r = 0; r < 18; r++) {
            let isFull = true; let hasBlack = false; let hasG = false;
            for (let c = 0; c < 9; c++) {
                if (!this.board[r][c]) isFull = false;
                if (this.board[r][c] === 15) hasBlack = true;
                if (this.board[r][c] === 14) hasG = true;
            }
            if (isFull) { if (!(hasBlack && !hasG)) { lines.push(r); if (hasG) hasGold = true; } }
        }
        
        let finalLines = new Set(lines); let isMassive = lines.length >= 3;
        if (hasGold) { lines.forEach(r => { if (this.board[r].includes(14)) { for (let i = Math.max(0, r - 2); i <= Math.min(17, r + 2); i++) finalLines.add(i); } }); }

        let cleared = finalLines.size; let destroyBlack = isMassive; 
        let isBigBang = cleared >= 2 || hasGold || destroyBlack;
        
        if (cleared > 0 || destroyBlack) {
            finalLines.forEach(r => { for (let c = 0; c < 9; c++) { if (this.board[r][c] !== 0) { CanvasSys.addParticles(c, r, CanvasSys.COLORS[this.board[r][c]]||'#fff', isBigBang); if (this.board[r][c]===15) blackDestroyed++; } } });
            if (destroyBlack) { for (let r=0; r<18; r++) { for (let c=0; c<9; c++) { if (this.board[r][c]===15 && !finalLines.has(r)) { CanvasSys.addParticles(c, r, CanvasSys.COLORS[15], true); this.board[r][c]=0; blackDestroyed++; } } } }
            finalLines.forEach(r => { for(let c=0; c<9; c++) this.board[r][c] = 0; }); 
            CanvasSys.renderAll(this.board, null);

            comboCount++; let multi = comboCount > 1 ? comboCount : 1;
            let pts = cleared * 100 * this.speedLevel * multi;
            AudioSys.play('bonus');
            
            if (hasGold) { pts *= 2; Sys.vibrate(100); UI.showMegaPop("SUPER BOMB!!", `+${pts}`, "var(--accent-gold)"); } 
            else if (destroyBlack) { Sys.vibrate(100); UI.showMegaPop("CRITICAL!!", `+${pts}`, "var(--accent-pink)"); } 
            else if (isBigBang) { Sys.vibrate(80); UI.showMegaPop(`${cleared} LINES!!`, `+${pts}`, "var(--accent-blue)"); }
            else { Sys.vibrate(30); UI.showMegaPop("CLEAR!", `+${pts}`, "var(--accent-green)"); }
            
            if (blackDestroyed > 0) pts += (blackDestroyed * 1000); 
            this.score += pts; UI.updateScore(this.score);
            
            setTimeout(() => CanvasSys.canvas.style.backgroundColor = "#020617", 150);

            // 💡 【バグ修正】重力落下処理を完全復旧
            await new Promise(r => setTimeout(r, 300)); 
            for (let c = 0; c < 9; c++) { 
                let emp = 17; 
                for (let r = 17; r >= 0; r--) { 
                    if (this.board[r][c] !== 0) { 
                        if (r !== emp) { 
                            this.board[emp][c] = this.board[r][c]; 
                            this.board[r][c] = 0; 
                        } 
                        emp--; 
                    } 
                } 
            }
            CanvasSys.renderAll(this.board, null);
            await new Promise(r => setTimeout(r, 200)); 
            await this.processChains(comboCount);
        }
    },

    triggerGameOver() {
        this.pause(); UI.state = 'GAMEOVER'; Sys.storageRemove('block_puzzle_save');
        let pct = 99; if(this.score > 20000) pct = 1; else if(this.score > 5000) pct = 5; else if(this.score > 1000) pct = 15; else if(this.score > 100) pct = 35;
        document.getElementById('percentile-text').innerText = `上位 ${pct}％`;
        document.getElementById('overlay-gameover').classList.add('is-active');
        UI.update(); Ranking.save(this.score);
    }
};

// 8. リアルタイムレベル変更
document.getElementById('config-level').addEventListener('change', () => {
    Ranking.load();
    if(UI.state === 'MATH' || UI.state === 'TETRIS') {
        MathInput.answer = NaN;
        Game.generateProblem(); 
    }
});

// 9. ブロック操作アクション（PCではW/A/S/Dキーにも対応！）
const Action = {
    timer: null,
    start(act, isForce = false, e) {
        if(e) e.preventDefault(); AudioSys.wakeUp();
        if(UI.state !== 'TETRIS') return;
        this.doAct(act); if(!isForce) this.timer = setInterval(() => this.doAct(act), 120);
    },
    stop(e) { if(e) e.preventDefault(); if(this.timer) clearInterval(this.timer); },
    doAct(act) {
        if(UI.state !== 'TETRIS') return;
        if(act === 'left' && !Game.collide(Game.curPiece.x-1, Game.curPiece.y, Game.curPiece.shape)) { Game.curPiece.x--; CanvasSys.renderAll(Game.board, Game.curPiece); Sys.vibrate(5); }
        else if(act === 'right' && !Game.collide(Game.curPiece.x+1, Game.curPiece.y, Game.curPiece.shape)) { Game.curPiece.x++; CanvasSys.renderAll(Game.board, Game.curPiece); Sys.vibrate(5); }
        else if(act === 'drop') { Game.drop(); Sys.vibrate(5); }
        else if(act === 'rotate') { const nShape = Game.curPiece.shape[0].map((_, i) => Game.curPiece.shape.map(r => r[i]).reverse()); if(!Game.collide(Game.curPiece.x, Game.curPiece.y, nShape)) { Game.curPiece.shape = nShape; CanvasSys.renderAll(Game.board, Game.curPiece); Sys.vibrate(10); } }
        else if(act === 'hardDrop') { while(!Game.collide(Game.curPiece.x, Game.curPiece.y+1, Game.curPiece.shape)) Game.curPiece.y++; if(Game.interval) clearInterval(Game.interval); Game.merge(); Sys.vibrate(20); }
    }
};

document.addEventListener('keydown', (e) => {
    if(UI.state !== 'TETRIS') return;
    if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault(); 
    AudioSys.wakeUp();
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') Action.doAct('left');
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') Action.doAct('right');
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') Action.doAct('drop');
    else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') Action.doAct('rotate');
    else if (e.key === ' ') Action.doAct('hardDrop');
});

// 10. バイラル・ランキング
const Viral = {
    getText() {
        let lv = document.getElementById('config-level').options[document.getElementById('config-level').selectedIndex].text;
        let t = Game.score > 20000 ? "神脳👑" : (Game.score > 5000 ? "達人🔥" : (Game.score > 1000 ? "熟練者✨" : "挑戦者🌱"));
        return encodeURIComponent(`【挑戦者求む🔥】\nブロック計算パズルで称号「${t}」を獲得！\nスコア: ${Number(Game.score).toLocaleString()}点 (レベル: ${lv})\n\n私を超えられるかな？😏👇\n#ブロック計算パズル #脳トレ`);
    },
    shareX() { window.open(`https://twitter.com/intent/tweet?text=${this.getText()}&url=${encodeURIComponent(window.location.href)}`, '_blank'); },
    shareLINE() { window.open(`https://line.me/R/msg/text/?${this.getText()}%0A${encodeURIComponent(window.location.href)}`, '_blank'); }
};

const Ranking = {
    async load() {
        const el = document.getElementById('ranking-container');
        if(!db) { el.innerHTML = '<div style="text-align:center; padding:10px; color:#f43f5e;">Firebase未設定</div>'; return; }
        let lv = document.getElementById('config-level').value;
        el.innerHTML = '<div style="text-align:center; padding:10px; color:#94a3b8;">読込中...</div>';
        try {
            const snap = await db.collection(`ranks_level_${lv}`).orderBy("score", "desc").limit(10).get();
            let html = ''; let i = 1;
            snap.forEach(doc => {
                let d = doc.data(); let icon = i===1?'🥇':(i===2?'🥈':(i===3?'🥉':'')); let col = i===1?'var(--accent-gold)':(i===2?'#cbd5e1':(i===3?'#b45309':'#e2e8f0'));
                html += `<div class="rank-row" style="color:${col};"><span class="rank-pos">${icon} ${i}位</span><span class="rank-name">${d.name}</span><span class="rank-score">${Number(d.score).toLocaleString()}点</span></div>`; i++;
            });
            if(html==='') html = '<div style="text-align:center; padding:20px; color:var(--accent-gold); font-weight:bold;">最初のトップ10になろう！</div>';
            el.innerHTML = html;
        } catch(e) { el.innerHTML = '<div style="text-align:center; padding:10px;">エラー</div>'; }
    },
    async save(sc) {
        if(sc <= 0 || !db) return;
        let lv = document.getElementById('config-level').value;
        let name = prompt("トップ10入り！名前を入力してください:", "ゆうしゃ") || "ゆうしゃ";
        try { await db.collection(`ranks_level_${lv}`).add({ name: name, score: sc, timestamp: new Date() }); this.load(); } catch(e){}
    }
};
