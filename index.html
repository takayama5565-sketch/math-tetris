<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ブロック計算パズル - 新生マスター版 -</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics-compat.js"></script>

    <style>
        /* 📱 基礎リセット */
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; touch-action: none; background-color: #0f172a; color: #fff; font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        
        /* 📱 全体レイアウト（頑丈なフレックスボックス） */
        #app-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100vw; box-sizing: border-box; }
        #mobile-header { flex: 0 0 55px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: #1e293b; border-bottom: 3px solid #38bdf8; z-index: 10;}
        #mobile-header h1 { color: #38bdf8; font-size: 18px; margin: 0; font-weight: 900;}
        .score-box { font-size: 24px; font-weight: 900; margin: 0; transition: transform 0.1s;}
        .menu-btn { background: #334155; color: #38bdf8; border: 2px solid #38bdf8; border-radius: 8px; padding: 8px 12px; font-weight: bold; cursor: pointer; }

        /* 📱 メインコンテンツエリア */
        #main-content { display: flex; flex-direction: column; flex: 1; overflow: hidden; position: relative;}

        /* 中央パズルエリア（スマホ時は上部） */
        #center-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; min-height: 0;}
        #canvas-wrapper { position: relative; height: 100%; aspect-ratio: 1/2; max-width: 100%; display: flex; justify-content: center; align-items: center;}
        #gameCanvas, #particleCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 8px; }
        #gameCanvas { background-color: #020617; border: 3px solid #38bdf8; box-sizing: border-box; box-shadow: 0 0 15px rgba(56,189,248,0.3);}
        #particleCanvas { z-index: 5; pointer-events: none; }
        #next-box { position: absolute; top: 5px; right: 5px; width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid #38bdf8; border-radius: 8px; z-index: 6; display: flex; justify-content: center; align-items: center;}
        #nextCanvas { width: 100%; height: 100%; }

        /* 右操作エリア（スマホ時は下部） */
        #right-panel { flex: 0 0 auto; display: flex; flex-direction: column; background: #1e293b; border-top: 4px solid #fb7185; padding: 15px 10px; box-sizing: border-box; width: 100%; z-index: 5;}

        /* 計算UI周り */
        #math-ui { display: flex; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto;}
        #math-status { font-size: 16px; font-weight: bold; color: #38bdf8; text-align: center; margin-bottom: 5px; height: 20px;}
        #timer-bar-container { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin-bottom: 8px; overflow: hidden; display: none;}
        #timer-bar-fill { height: 100%; width: 100%; background: #4ade80; transition: width 0.1s linear, background-color 0.3s; }

        .math-row { display: flex; align-items: center; justify-content: space-between; background: #0f172a; border: 3px dashed #facc15; border-radius: 12px; padding: 10px; margin-bottom: 10px;}
        #math-problem { font-size: 28px; font-weight: bold; color: #facc15; letter-spacing: 2px;}
        #math-input-display { font-size: 28px; font-weight: bold; color: #fff; background: #334155; padding: 5px 15px; border-radius: 8px; min-width: 90px; text-align: right; border: 2px solid #64748b; height: 45px; line-height: 45px;}
        
        /* テンキー（スマホでも押しやすく） */
        #numpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 500px; margin: 0 auto;}
        .num-btn { background: #334155; color: #fff; border: 2px solid #64748b; border-radius: 12px; font-size: 24px; font-weight: bold; height: 50px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 0 #0f172a; cursor: pointer;}
        .num-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #0f172a; background: #475569; }
        .num-btn.del { background: #f43f5e; border-color: #be123c; box-shadow: 0 4px 0 #881337;}
        .num-btn.enter { background: #38bdf8; color: #000; border-color: #0284c7; box-shadow: 0 4px 0 #0c4a6e; grid-column: span 2;}
        .num-btn.zero { grid-column: span 2; }

        /* パズル操作UI（正解時） */
        #puzzle-ui { display: none; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto;}
        #t-status { color: #4ade80; font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 10px;}
        #t-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;}
        .t-btn { background: #1e293b; color: #38bdf8; border: 3px solid #38bdf8; border-radius: 12px; font-size: 32px; font-weight: bold; height: 60px; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 0 #0284c7;}
        .t-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #0284c7; background: #38bdf8; color: #000;}
        .btn-drop { grid-column: span 4; background: #fb7185; color: white; border: 3px solid #e11d48; box-shadow: 0 6px 0 #9f1239; font-size: 24px; height: 50px;}

        /* 💡 新機能：コンボゲージ表示 */
        #math-combo-display { color: #facc15; font-size: 14px; font-weight: bold; text-align: center; height: 20px; margin-bottom: 5px; text-shadow: 0 0 5px #facc15;}

        /* メニュー・設定系共通 */
        .setting-group { margin-bottom: 12px; text-align: left; }
        .setting-group label { font-size: 12px; color: #38bdf8; display: block; margin-bottom: 4px; font-weight: bold;}
        select { width: 100%; padding: 12px; background: #334155; color: #fff; border: 2px solid #64748b; border-radius: 8px; font-size: 14px; font-weight: bold; box-sizing: border-box;}
        .action-btn { width: 100%; padding: 15px; background: #a855f7; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 8px; box-shadow: 0 4px 0 #7e22ce; cursor: pointer; transition: 0.1s;}
        .action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #7e22ce; }
        .save-btn { background: #eab308; box-shadow: 0 4px 0 #a16207; color: #000; margin-bottom: 10px;}
        .close-btn { background: #64748b; box-shadow: 0 4px 0 #334155; margin-top: 10px;}
        .mute-btn { background: #475569; box-shadow: 0 4px 0 #1e293b; font-size: 14px;}
        
        .super-score { background: linear-gradient(45deg, #facc15, #f43f5e, #38bdf8, #a855f7, #facc15); background-size: 300% 300%; animation: gradient-glow 3s ease infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 15px rgba(250, 204, 21, 0.4); display: inline-block; }
        .score-pop { transform: scale(1.4); }

        /* 💡 ド派手なメガ・スコアPOP演出 */
        .mega-popup { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.1); font-weight: 900; z-index: 9999; pointer-events: none; opacity: 0; white-space: nowrap; text-align: center; text-shadow: 0 0 20px rgba(0,0,0,1), 0 0 40px rgba(0,0,0,1), 2px 2px 0 #000; }
        .mega-popup.animate { animation: superMegaPop 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .mega-popup .pop-main { font-size: clamp(30px, 8vw, 55px); display: block;}
        .mega-popup .pop-sub { font-size: clamp(20px, 5vw, 35px); display: block; margin-top: 5px;}
        @keyframes superMegaPop { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.1) rotate(-10deg); } 20% { opacity: 1; transform: translate(-50%, -60px) scale(1.2) rotate(5deg); } 40% { opacity: 1; transform: translate(-50%, -65px) scale(1) rotate(0deg); } 80% { opacity: 1; transform: translate(-50%, -75px) scale(1.1); } 100% { opacity: 0; transform: translate(-50%, -100px) scale(1.5); filter: blur(4px); } }

        /* 💻 パソコン用レイアウト（絶対に潰れない頑丈な設計） */
        @media (min-width: 800px) {
            #main-content { flex-direction: row; justify-content: center; align-items: stretch; padding: 20px; max-width: 1200px; gap: 30px; margin: 0 auto; box-sizing: border-box;}
            #mobile-header { display: none !important; }
            
            /* 左メニューパネル（絶対幅300px） */
            #left-panel { display: flex !important; position: static; width: 300px; flex: 0 0 300px; box-shadow: 0 0 20px rgba(56,189,248,0.2); background: #1e293b; border-radius: 12px; border: 3px solid #38bdf8; padding: 20px; z-index: 1;}
            
            /* 中央パズルパネル（可変幅） */
            #center-panel { flex: 1 1 340px; max-width: 400px; padding: 0; display: flex; justify-content: center; align-items: center;}
            #canvas-wrapper { width: 100%; aspect-ratio: 1/2; position: relative;}
            
            /* 右計算パネル（絶対幅360px） */
            #right-panel { display: flex !important; position: static; width: 360px; flex: 0 0 360px; border-top: none; border: 3px solid #fb7185; border-radius: 12px; justify-content: center;}
            
            /* PC用の表示調整 */
            #numpad, #t-controls, #math-input-display { display: none !important; }
            .pc-title { display: block !important; color: #38bdf8; font-size: 26px; text-align: center; margin: 0 0 20px 0; font-weight: 900;}
            .close-btn { display: none !important; }
            .pc-score-box { display: block !important; font-size: 36px; font-weight: bold; color: #fb7185; margin-bottom: 20px; text-align: center;}
            
            .math-row { flex-direction: column; padding: 40px 20px; gap: 25px; border-width: 4px;}
            #math-problem { font-size: 42px; }
            #math-status { font-size: 20px; margin-bottom: 15px;}
            
            #real-input-container { display: flex !important; gap: 10px; width: 100%;}
            #math-answer-real { flex: 1; padding: 15px; border-radius: 8px; font-size: 32px; text-align: center; font-weight: bold; border: 3px solid #64748b; background: #fff; color: #000; width: 100%; box-sizing: border-box;}
            #answer-btn-real { width: 90px; padding: 0; background-color: #38bdf8; box-shadow: 0 6px 0 #0284c7; color: #000; font-weight: 900; font-size: 18px; border-radius: 8px; border: none; cursor: pointer;}
            #answer-btn-real:active { transform: translateY(6px); box-shadow: 0 0 0 #0284c7;}
        }
        
        /* 📱 スマホ用オーバーレイメニュー（PC版の設定に影響しないように完全分離） */
        @media (max-width: 799px) {
            .pc-title, .pc-score-box, #real-input-container { display: none !important; }
            #left-panel {
                position: fixed !important; top: 0; left: 0; width: 100vw; height: 100dvh;
                background: rgba(15,23,42,0.98) !important; z-index: 9999;
                border: none !important; border-radius: 0 !important; padding: 40px 20px !important;
                display: none; flex-direction: column; justify-content: center;
            }
            #left-panel.show-menu { display: flex !important; }
            .pc-title { display: block !important; margin-bottom: 30px; font-size: 32px;}
        }

        /* ゲームオーバー画面 */
        #game-over-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2,6,23,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; z-index: 10; }
        
        /* ランキング画面 */
        #ranking-board { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 180px; max-height: 250px; text-align: left; font-size: 14px; margin-top: 15px; border-top: 2px solid #334155; padding-top: 10px;}
        #ranking-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;}
        #ranking-list::-webkit-scrollbar { width: 6px; }
        #ranking-list::-webkit-scrollbar-track { background: #1e293b; }
        #ranking-list::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 3px; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 5px; border-bottom: 1px solid #334155;}
        .rank-pos { font-weight: bold; width: 60px; flex-shrink: 0; white-space: nowrap; }
        .rank-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0 10px; color: #fff;}
        .rank-score { font-weight: bold; color: #4ade80; flex-shrink: 0; white-space: nowrap; }

        /* スポンサー枠 */
        #sponsor-container { flex: 0 0 60px; background: #000; display: flex; justify-content: center; align-items: center; gap: 15px; padding: 5px; box-sizing: border-box; border-top: 1px solid #333; overflow: hidden;}
        .sponsor-banner { height: 100%; flex: 1; max-width: 320px; background: #111; border: 1px solid #444; display: flex; justify-content: center; align-items: center; cursor: pointer; border-radius: 4px; overflow: hidden; position: relative; text-decoration: none;}
        .sponsor-banner img { width: 100%; height: 100%; object-fit: cover;}
        .sponsor-recruit { background: linear-gradient(135deg, #0f172a, #1e293b); color: #facc15; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px dashed #facc15; box-sizing: border-box; animation: pulse-sponsor 2s infinite;}
        .sponsor-recruit .main-text { font-size: 16px; font-weight: 900; letter-spacing: 1px;}
        .sponsor-recruit .sub-text { font-size: 10px; color: #94a3b8; margin-top: 2px;}
        @keyframes pulse-sponsor { 0% { box-shadow: 0 0 5px rgba(250, 204, 21, 0.2); } 50% { box-shadow: 0 0 15px rgba(250, 204, 21, 0.6); } 100% { box-shadow: 0 0 5px rgba(250, 204, 21, 0.2); } }
        
        .correct-flash { background-color: #4ade80 !important; color: #000 !important; border-color: #fff !important; box-shadow: 0 0 30px #4ade80;}
        .error-shake { animation: errShake 0.4s cubic-bezier(.36,.07,.19,.97) both; background-color: #e11d48 !important; border-color: #fff !important; box-shadow: 0 0 30px #e11d48 !important; }
        @keyframes errShake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="mobile-header">
        <h1>ブロック計算パズル</h1>
        <div class="score-box"><span class="super-score" id="score-mobile">0</span></div>
        <button class="menu-btn" onclick="openMobileSettings()">設定・中断</button>
    </div>

    <div id="main-content">
        <div id="left-panel">
            <h2 class="pc-title">ブロック計算パズル<br><span style="font-size:14px; color:#aaa;">グローバルモード</span></h2>
            
            <div class="setting-group">
                <label>計算のレベル</label>
                <select id="level">
                    <option value="1">Lv1: 1桁の たし算・ひき算</option>
                    <option value="2">Lv2: 2桁の たし算・ひき算</option>
                    <option value="3">Lv3: 1桁の かけ算 (九九)</option>
                    <option value="4">Lv4: 平方計算 (11〜19の2乗)</option>
                    <option value="5">Lv5: 2桁 × 1桁の かけ算</option>
                    <option value="6">Lv6: 立方数 (2×2×2〜9×9×9)</option>
                    <option value="7">Lv7: 円周率 (3.14)</option>
                    <option value="8">Lv8: 13の倍数 (インド式)</option>
                    <option value="9">Lv9: 17の倍数 (インド式)</option>
                    <option value="10">Lv10: 19の倍数 (インド式)</option>
                    <option value="11">Lv11: 23の倍数</option>
                    <option value="12">Lv12: 29の倍数</option>
                    <option value="13">Lv13: 37の倍数</option>
                    <option value="14">Lv14: 2桁の かけ算</option>
                    <option value="15">Lv15: 2桁の わり算</option>
                    <option value="16" style="color:#facc15;">Lv16: 全部まぜまぜ (ランダム)</option>
                </select>
            </div>
            <div class="setting-group">
                <label>タイムボーナス</label>
                <select id="time-limit">
                    <option value="0">なし (じっくり考える)</option>
                    <option value="10">10秒以内 に答える</option>
                    <option value="8">8秒以内 に答える</option>
                    <option value="5">5秒以内 に答える</option>
                    <option value="3">3秒以内 (神ワザ)</option>
                </select>
            </div>
            <div class="setting-group">
                <label>ブロックのスピード</label>
                <select id="speed">
                    <option value="1">1 (ゆっくり)</option>
                    <option value="3">3</option>
                    <option value="5" selected>5 (ふつう)</option>
                    <option value="8">8 (はやい)</option>
                    <option value="10">10 (激ムズ)</option>
                </select>
            </div>

            <div id="first-time-buttons" style="display: block;">
                <button class="action-btn" onclick="handleStartClick(event, true)">✨ ゲームをはじめる</button>
            </div>

            <div id="continue-buttons" style="display: none;">
                <button class="action-btn save-btn" onclick="executeLoad()" style="display:block; margin-bottom:10px;">▶️ 続きから遊ぶ</button>
                <button class="action-btn" onclick="handleStartClick(event, true)" style="background:#f43f5e; box-shadow:0 4px 0 #be123c;">⚠️ 記録を消して最初から</button>
            </div>

            <div id="menu-playing" style="display: none;">
                <button class="action-btn" style="background:#eab308; color:#000; box-shadow:0 4px 0 #a16207;" onclick="openMobileSettings()">⏸️ 一時停止 / メニュー</button>
            </div>

            <div id="menu-paused" style="display: none;">
                <button class="action-btn" style="background:#4ade80; color:#000; box-shadow:0 4px 0 #16a34a; margin-bottom:10px;" onclick="closeMobileSettings()">▶️ ゲームを再開する</button>
                <button class="action-btn save-btn" onclick="saveAndQuitGame()" style="display:block; margin-bottom:10px;">💾 セーブして終わる</button>
                <button class="action-btn" onclick="handleStartClick(event, true)" style="background:#f43f5e; box-shadow:0 4px 0 #be123c;">⚠️ 最初からやり直す</button>
            </div>

            <button class="action-btn mute-btn" id="mute-btn" onclick="toggleMute()">🔊 音声オン (タップで消音)</button>

            <div id="ranking-board">
                <h3 style="color:#38bdf8; margin:0 0 5px 0; text-align:center;">🏆 トップ10</h3>
                <div id="ranking-list">
                    <div style="text-align:center; padding:10px; color:#94a3b8;">読み込み中...</div>
                </div>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button class="action-btn" style="flex:1; background:#000; color:#fff; border:2px solid #333; box-shadow: 0 4px 0 #222; font-size:12px; padding:10px; margin:0;" onclick="shareScoreX()">𝕏 で自慢</button>
                    <button class="action-btn" style="flex:1; background:#06c755; color:#fff; border:2px solid #05a546; box-shadow: 0 4px 0 #048839; font-size:12px; padding:10px; margin:0;" onclick="shareScoreLINE()">LINE で送る</button>
                </div>
            </div>
        </div>

        <div id="center-panel">
            <div id="canvas-wrapper">
                <canvas id="gameCanvas" width="270" height="540"></canvas>
                <canvas id="particleCanvas" width="270" height="540"></canvas>
                <div id="next-box"><canvas id="nextCanvas" width="100%" height="100%"></canvas></div>
                
                <div id="game-over-overlay" class="hidden">
                    <h2 style="color:#f43f5e; font-size:36px; margin:0;">GAME OVER</h2>
                    
                    <div id="percentile-box" style="margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.8); border: 2px dashed #facc15; border-radius: 8px; text-align: center;">
                        <span style="color:#fff; font-size:14px;">あなたの頭脳レベルは...</span><br>
                        <span id="percentile-result" style="color:#facc15; font-size:24px; font-weight:bold;">上位 ??％</span>
                    </div>
                    
                    <div style="display: flex; gap: 10px; width: 90%; margin-top:10px;">
                        <button class="action-btn" style="flex:1; background:#000; color:#fff; border:2px solid #333; box-shadow: 0 4px 0 #222; font-size:14px;" onclick="shareScoreX()">𝕏 で自慢</button>
                        <button class="action-btn" style="flex:1; background:#06c755; color:#fff; border:2px solid #05a546; box-shadow: 0 4px 0 #048839; font-size:14px;" onclick="shareScoreLINE()">LINE で送る</button>
                    </div>
                    
                    <button class="action-btn" style="width:90%; margin-top:15px;" onclick="openMobileSettings()">メニューにもどる</button>
                </div>
            </div>
        </div>

        <div id="right-panel">
            <div class="pc-score-box">SCORE<br><span class="super-score" id="score-pc-val">0</span></div>
            
            <div id="math-ui">
                <div id="math-combo-display"></div>
                <div id="timer-bar-container"><div id="timer-bar-fill"></div></div>
                <div id="math-status" class="pulse-text">左のむらさきのボタンをおしてね</div>
                
                <div class="math-row" id="problem-box">
                    <div id="math-problem">???</div>
                    <div id="math-input-display" class="mobile-only">_</div>
                    
                    <form id="real-input-container" onsubmit="submitAnswer(event)">
                        <input type="text" id="math-answer-real" placeholder="答えを入力" autocomplete="off" disabled>
                        <button type="submit" id="answer-btn-real" disabled>決定</button>
                    </form>
                </div>
                
                <div id="numpad">
                    <div class="num-btn" ontouchstart="inputPad('7', event)" onmousedown="inputPad('7', event)">7</div>
                    <div class="num-btn" ontouchstart="inputPad('8', event)" onmousedown="inputPad('8', event)">8</div>
                    <div class="num-btn" ontouchstart="inputPad('9', event)" onmousedown="inputPad('9', event)">9</div>
                    <div class="num-btn del" ontouchstart="inputPad('DEL', event)" onmousedown="inputPad('DEL', event)">消す</div>
                    <div class="num-btn" ontouchstart="inputPad('4', event)" onmousedown="inputPad('4', event)">4</div>
                    <div class="num-btn" ontouchstart="inputPad('5', event)" onmousedown="inputPad('5', event)">5</div>
                    <div class="num-btn" ontouchstart="inputPad('6', event)" onmousedown="inputPad('6', event)">6</div>

        if (audioCtx && audioCtx.state === 'suspended') {

        if (!keepAliveOsc) {
            keepAliveOsc = audioCtx.createOscillator();
            const silentNode = audioCtx.createGain();
            silentNode.gain.value = 0; 
            keepAliveOsc.connect(silentNode);
            silentNode.connect(audioCtx.destination);
            keepAliveOsc.start();
        }
    } catch(e) {}
}

function playExplosion(comboCount, isBigBang = false) {
    if(isMuted) return; 
    ensureAudioAwake();
    try {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        const time = audioCtx.currentTime;
        const duration = isBigBang ? 1.5 : 0.8 + (Math.min(comboCount, 5) * 0.2); 

        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource(); noise.buffer = buffer;

        const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
        filter.frequency.setValueAtTime(isBigBang ? 3000 : 1500 + (comboCount * 500), time);
        filter.frequency.exponentialRampToValueAtTime(10, time + duration);

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(isBigBang ? 2.0 : 1.5 + (comboCount * 0.3), time); 
        gain.gain.exponentialRampToValueAtTime(0.01, time + duration);

        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start(time);

        const subOsc = audioCtx.createOscillator(); subOsc.type = 'triangle'; 
        subOsc.frequency.setValueAtTime(isBigBang ? 200 : 120 + (comboCount * 10), time);
        subOsc.frequency.exponentialRampToValueAtTime(10, time + duration * (isBigBang ? 1.0 : 0.8));
        const subGain = audioCtx.createGain();
        subGain.gain.setValueAtTime(isBigBang ? 2.5 : 2.0, time);
        subGain.gain.exponentialRampToValueAtTime(0.01, time + duration * (isBigBang ? 1.0 : 0.8));
        subOsc.connect(subGain); subGain.connect(audioCtx.destination);
        subOsc.start(time); subOsc.stop(time + duration * (isBigBang ? 1.0 : 0.8));
    } catch(e){}
}

        gain.gain.setValueAtTime(1.0, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.6);
        osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);

    } catch(e){}
}

function playSound(type) {
    if(isMuted) return; 
    ensureAudioAwake();
    try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') { 
            osc.type = 'triangle'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.frequency.setValueAtTime(1108.73, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'levelup') { 
            osc.type = 'square'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(1760, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'bonus') { 
            osc.type = 'sine'; osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime); osc.frequency.setValueAtTime(1567.98, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(2093.00, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    } catch(e){}
}

function generateMathProblem() {
    problemCount++;
    let n1, n2, symbol, answer, pStr;
    let levelToUse = document.getElementById('level').value;
    if (levelToUse === "16") levelToUse = String(Math.floor(Math.random() * 15) + 1);
    
    let attempts = 0;
    do {
        switch(levelToUse) {
            case "1": 
                if (Math.random() < 0.3) { answer = Math.floor(Math.random()*9)+1; pStr = `? ＋ ${10 - answer} ＝ 10`; } 
                else { n1 = Math.floor(Math.random()*9)+1; n2 = Math.floor(Math.random()*9)+1; if(Math.random()>0.5){ pStr = `${n1} ＋ ${n2} ＝ ?`; answer = n1 + n2; } else { let max = Math.max(n1, n2); let min = Math.min(n1, n2); pStr = `${max} － ${min} ＝ ?`; answer = max - min; } }
                break;
            case "2": 
                if(Math.random()>0.5){ do { n1 = Math.floor(Math.random()*90)+10; n2 = Math.floor(Math.random()*90)+10; } while(n1%10 + n2%10 < 10); pStr = `${n1} ＋ ${n2} ＝ ?`; answer = n1 + n2; } 
                else { do { n1 = Math.floor(Math.random()*90)+10; n2 = Math.floor(Math.random()*90)+10; } while(Math.max(n1,n2)%10 >= Math.min(n1,n2)%10); let max = Math.max(n1, n2); let min = Math.min(n1, n2); pStr = `${max} － ${min} ＝ ?`; answer = max - min; } 
                break;
            case "3": n1 = Math.floor(Math.random()*9)+1; n2 = Math.floor(Math.random()*9)+1; pStr = `${n1} × ${n2} ＝ ?`; answer = n1 * n2; break;
            case "4": n1 = Math.floor(Math.random()*9)+11; pStr = `${n1} × ${n1} ＝ ?`; answer = n1 * n1; break;
            case "5": n1 = Math.floor(Math.random()*90)+10; n2 = Math.floor(Math.random()*9)+1; pStr = `${n1} × ${n2} ＝ ?`; answer = n1 * n2; break;
            case "6": n1 = Math.floor(Math.random()*8)+2; pStr = `${n1} × ${n1} × ${n1} ＝ ?`; answer = n1 * n1 * n1; break;
            case "7": n2 = Math.floor(Math.random()*10)+1; pStr = `3.14 × ${n2} ＝ ?`; answer = Math.round(3.14 * n2 * 100) / 100; break;
            case "8": n2 = Math.floor(Math.random()*10)+1; pStr = `13 × ${n2} ＝ ?`; answer = 13 * n2; break;
            case "9": n2 = Math.floor(Math.random()*10)+1; pStr = `17 × ${n2} ＝ ?`; answer = 17 * n2; break;
            case "10": n2 = Math.floor(Math.random()*10)+1; pStr = `19 × ${n2} ＝ ?`; answer = 19 * n2; break;
            case "11": n2 = Math.floor(Math.random()*10)+1; pStr = `23 × ${n2} ＝ ?`; answer = 23 * n2; break;
            case "12": n2 = Math.floor(Math.random()*10)+1; pStr = `29 × ${n2} ＝ ?`; answer = 29 * n2; break;
            case "13": n2 = Math.floor(Math.random()*10)+1; pStr = `37 × ${n2} ＝ ?`; answer = 37 * n2; break;
            case "14": n1 = Math.floor(Math.random()*90)+10; n2 = Math.floor(Math.random()*90)+10; pStr = `${n1} × ${n2} ＝ ?`; answer = n1 * n2; break;
            case "15": 
                answer = Math.floor(Math.random() * 8) + 2;
                let maxDivisor = Math.floor(99 / answer);
                n2 = Math.floor(Math.random() * (maxDivisor - 10 + 1)) + 10;
                n1 = answer * n2;
                pStr = `${n1} ÷ ${n2} ＝ ?`; 
                break;
        }
        attempts++;
    } while (recentProblems.includes(pStr) && attempts < 10);
    
    recentProblems.push(pStr);
    if(recentProblems.length > 3) recentProblems.shift();

    currentAnswer = answer; currentProblemString = pStr;
    
    let problemBox = document.getElementById('problem-box');
    document.getElementById('math-problem').innerText = pStr; 
    problemBox.classList.remove('correct-flash', 'error-shake'); 
    
    currentInputStr = ""; 
    document.getElementById('math-answer-real').value = "";
    document.getElementById('math-answer-real').disabled = false;
    document.getElementById('answer-btn-real').disabled = false;
    updateInputDisplay();
    
    canOperate = false;
    
    let mathStatus = document.getElementById('math-status');
    mathStatus.innerText = "答えを入力してね";
    mathStatus.style.color = "#38bdf8";
    mathStatus.classList.remove('pulse-text'); 
    
    timeLimitSec = parseInt(document.getElementById('time-limit').value);
    if(timeLimitSec > 0) {
        document.getElementById('timer-bar-container').style.display = 'block';
        if(timerAnimFrame) cancelAnimationFrame(timerAnimFrame);
        problemStartTime = Date.now(); 
        updateTimer();
    } else {
        document.getElementById('timer-bar-container').style.display = 'none';
        problemStartTime = Date.now(); 
    }
    
    showMathUI();
}

function submitAnswer(e) {
    if(e) e.preventDefault();
    if (canOperate || isGameOver) return; 

    let valToCheck = currentInputStr;
    if (!isMobile()) valToCheck = document.getElementById('math-answer-real').value;
    valToCheck = valToCheck.replace(/[０-９．]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[^0-9\-\.]/g, '');
    
    if (valToCheck === "") return; 
    vibrate(30); 
    
    let numVal = parseFloat(valToCheck); 
    let timeTaken = Date.now() - problemStartTime;
    let problemBox = document.getElementById('problem-box');
    
    if (Math.abs(numVal - currentAnswer) < 0.0001) {
        currentAnswer = NaN; canOperate = true; 
        isNextHidden = false; drawNextPiece();
        
        problemBox.classList.add('correct-flash');
        document.getElementById('math-answer-real').disabled = true;
        document.getElementById('answer-btn-real').disabled = true;
        
        // 💡 数学コンボシステム
        mathComboCount++;
        let comboMulti = 1.0;
        if(mathComboCount >= 10) comboMulti = 2.0;
        else if(mathComboCount >= 5) comboMulti = 1.5;
        else if(mathComboCount >= 3) comboMulti = 1.2;
        
        if (mathComboCount >= 2) {
            document.getElementById('math-combo-display').innerText = `🔥 ${mathComboCount}連続正解！ (スコア x${comboMulti})`;
        } else {
            document.getElementById('math-combo-display').innerText = "";
        }

        let basePoints = 10;
        let earned = 0;
        
        if(timeLimitSec > 0) {
            let remain = Math.max(0, timeLimitSec * 1000 - timeTaken);
            if(remain > 0) {
                let bonus = Math.floor(remain / 100) * currentSpeedLevel;
                earned = Math.floor((basePoints + bonus) * comboMulti);
                score += earned;
                triggerMegaPop("EXCELLENT!!", `+${earned}`, "#4ade80");
                playSound('bonus');
            } else { 
                earned = Math.floor(basePoints * comboMulti);
                score += earned;
                triggerMegaPop("GREAT!", `+${earned}`, "#38bdf8");
                playSound('correct'); 
            }
        } else { 
            earned = Math.floor(basePoints * comboMulti);
            score += earned;
            triggerMegaPop("GOOD!", `+${earned}`, "#38bdf8");
            playSound('correct'); 
        }

        updateScoreDisplay(); 
        showTetrisUI(); 
        
        if(gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(drop, dropSpeed);
        update();
    } else {
        mathComboCount = 0; // コンボリセット
        document.getElementById('math-combo-display').innerText = "";
        
        playHeavyMissEffect();
        let penalty = 50 * currentSpeedLevel;
        score = Math.max(0, score - penalty); 
        updateScoreDisplay();
        
        triggerMegaPop("MISS...", `➖${penalty}`, "#f43f5e");

        currentInputStr = ""; document.getElementById('math-answer-real').value = "";
        updateInputDisplay();
        
        isNextHidden = true; drawNextPiece(); 
        document.getElementById('math-status').innerText = "ペナルティ発生"; document.getElementById('math-status').style.color = "#e11d48";
        if(!isMobile()) document.getElementById('math-answer-real').focus();
    }
}

let actionTimer = null;
function startAction(actionFunc, e, once = false) {
    if(e) e.preventDefault();
    ensureAudioAwake();
    if (!canOperate || isGameOver) return;
    actionFunc();
    if(!once) { if(actionTimer) clearInterval(actionTimer); actionTimer = setInterval(actionFunc, 120); }
}
function stopAction(e) { if(e) e.preventDefault(); if(actionTimer) clearInterval(actionTimer); }

let particles = [];
function createParticles(x, y, colorStr, isSuper = false) {
    let count = isSuper ? 30 : 10; 
    for (let i = 0; i < count; i++) particles.push({ x: x * BLOCK_SIZE + BLOCK_SIZE / 2, y: y * BLOCK_SIZE + BLOCK_SIZE / 2, vx: (Math.random() - 0.5) * (isSuper?40:20), vy: (Math.random() - 0.5) * (isSuper?40:20) - 5, life: 1.0, color: colorStr, size: Math.random() * (isSuper?10:4) + 2 });
}
function updateParticles() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.8; p.life -= 0.04;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        pCtx.globalAlpha = p.life; pCtx.fillStyle = p.color; pCtx.fillRect(p.x, p.y, p.size, p.size);
    }
    pCtx.globalAlpha = 1.0; requestAnimationFrame(updateParticles);
}
requestAnimationFrame(updateParticles); 

function drawSquare(ctxToDraw, x, y, type, size = BLOCK_SIZE) {
    ctxToDraw.fillStyle = COLORS[type]; ctxToDraw.fillRect(x * size, y * size, size, size);
    ctxToDraw.strokeStyle = 'rgba(0,0,0,0.8)'; ctxToDraw.lineWidth = 1; ctxToDraw.strokeRect(x * size, y * size, size, size);
    ctxToDraw.fillStyle = 'rgba(255,255,255,0.4)'; ctxToDraw.fillRect(x * size + 2, y * size + 2, size - 4, 3);
    
    if(size < 15) return;
    
    ctxToDraw.textAlign = 'center'; ctxToDraw.textBaseline = 'middle';
    if (type === 14) { ctxToDraw.fillStyle = '#fff'; ctxToDraw.font = Math.floor(size * 0.7) + 'px Arial'; ctxToDraw.fillText('★', x * size + size / 2, y * size + size / 2 + 2); } 
    else if (type === 15) { ctxToDraw.fillStyle = '#fff'; ctxToDraw.font = Math.floor(size * 0.8) + 'px Arial'; ctxToDraw.fillText('✖', x * size + size / 2, y * size + size / 2 + 2); } 
}

function drawBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let r = 0; r < ROWS; r++) { for (let c = 0; c < COLS; c++) { if (board[r][c]) drawSquare(ctx, c, r, board[r][c], BLOCK_SIZE); } } }
function drawPiece() { if(!currentPiece) return; currentPiece.shape.forEach((row, y) => { row.forEach((value, x) => { if (value) drawSquare(ctx, currentPiece.x + x, currentPiece.y + y, currentPiece.type, BLOCK_SIZE); }); }); }
function drawGhost() {
    if (!currentPiece || !canOperate) return; let ghostY = currentPiece.y; while (!collideAt(currentPiece.x, ghostY + 1, currentPiece.shape)) ghostY++;
    ctx.globalAlpha = 0.2; currentPiece.shape.forEach((row, y) => { row.forEach((value, x) => { if (value) drawSquare(ctx, currentPiece.x + x, ghostY + y, currentPiece.type, BLOCK_SIZE); }); }); ctx.globalAlpha = 1.0; 
}
function drawNextPiece() {
    nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    if (isNextHidden) { nextCtx.fillStyle = '#e11d48'; nextCtx.font = 'bold 30px Arial'; nextCtx.textAlign = 'center'; nextCtx.textBaseline = 'middle'; nextCtx.fillText('❓', nextCanvas.width/2, nextCanvas.height/2 + 3); return; }
    if(!nextPiece) return; 
    
    const size = 12; 
    const w = nextPiece.shape[0].length * size;
    const h = nextPiece.shape.length * size;
    const offsetX = (nextCanvas.width - w) / 2; 
    const offsetY = (nextCanvas.height - h) / 2;
    
    nextPiece.shape.forEach((row, y) => { 
        row.forEach((value, x) => { 
            if (value) {
                nextCtx.fillStyle = COLORS[nextPiece.type];
                nextCtx.fillRect(offsetX + x * size, offsetY + y * size, size, size);
                nextCtx.strokeStyle = 'rgba(0,0,0,0.8)'; nextCtx.lineWidth = 1;
                nextCtx.strokeRect(offsetX + x * size, offsetY + y * size, size, size);
            }
        }); 
    });
}

function generateRandomPiece() { 
    const baseShape = SHAPES[Math.floor(Math.random() * 13) + 1]; 
    let type; const rand = Math.random();
    if (rand < 1/30) type = 15; 
    else if (rand < 1/30 + 1/40) type = 14; 
    else type = Math.floor(Math.random() * 13) + 1; 
    
    return { shape: baseShape, x: Math.floor(COLS/2)-1, y: 0, type: type }; 
}

function spawnPiece() {
    if (!nextPiece) nextPiece = generateRandomPiece();
    currentPiece = nextPiece; nextPiece = generateRandomPiece();
    isNextHidden = false; drawNextPiece();

    if (collideAt(currentPiece.x, currentPiece.y, currentPiece.shape)) { gameOver(); return; }
    if(gameInterval) clearInterval(gameInterval); generateMathProblem(); update();
}

function collideAt(cx, cy, shape) {
    for (let y = 0; y < shape.length; y++) { for (let x = 0; x < shape[y].length; x++) { if (shape[y][x]) { let newX = cx + x; let newY = cy + y; if (newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && board[newY][newX])) return true; } } }
    return false;
}

function saveLocalState() {
    if(isGameOver) { localStorage.removeItem('block_puzzle_save'); return; }
    const state = { board, score, currentPlayedLevel, currentSpeedLevel, piecesPlaced };
    localStorage.setItem('block_puzzle_save', JSON.stringify(state));
}

function merge() { 
    currentPiece.shape.forEach((row, y) => { row.forEach((value, x) => { if (value) board[currentPiece.y + y][currentPiece.x + x] = currentPiece.type; }); }); 
    piecesPlaced++;
    saveLocalState();
}

async function processChains(comboCount = 0) {
    let linesToClear = []; let hasGoldTrigger = false; let blackBlocksDestroyed = 0;

    for (let r = 0; r < ROWS; r++) {
        let isFull = true; let hasBlack = false; let hasGold = false;
        for (let c = 0; c < COLS; c++) { if (!board[r][c]) isFull = false; if (board[r][c] === 15) hasBlack = true; if (board[r][c] === 14) hasGold = true; }
        if (isFull) { if (!(hasBlack && !hasGold)) { linesToClear.push(r); if (hasGold) hasGoldTrigger = true; } }
    }
    
    let finalLinesToClear = new Set(linesToClear);
    let isMassiveClear = linesToClear.length >= 3;
    
    if (hasGoldTrigger) { linesToClear.forEach(r => { if (board[r].includes(14)) { for (let i = Math.max(0, r - 2); i <= Math.min(ROWS - 1, r + 2); i++) finalLinesToClear.add(i); } }); }

    let clearedCount = finalLinesToClear.size; let willDestroyAllBlacks = isMassiveClear; 
    let isBigBang = clearedCount >= 2 || hasGoldTrigger || willDestroyAllBlacks;
    
    if (clearedCount > 0 || willDestroyAllBlacks) {
        finalLinesToClear.forEach(r => { for (let c = 0; c < COLS; c++) { if (board[r][c] !== 0) { createParticles(c, r, COLORS[board[r][c]]||'#fff', isBigBang); if (board[r][c]===15) blackBlocksDestroyed++; } } });
        if (willDestroyAllBlacks) { for (let r=0; r<ROWS; r++) { for (let c=0; c<COLS; c++) { if (board[r][c]===15 && !finalLinesToClear.has(r)) { createParticles(c, r, COLORS[15], true); board[r][c]=0; blackBlocksDestroyed++; } } } }
        finalLinesToClear.forEach(r => { for(let c=0; c<COLS; c++) board[r][c] = 0; }); drawBoard(); 

        comboCount++; let comboMultiplier = comboCount > 1 ? comboCount : 1;
        let gainedScore = clearedCount * 100 * currentSpeedLevel * comboMultiplier;
        
        playExplosion(comboCount, isBigBang); 
        
        if (hasGoldTrigger) { 
            gainedScore *= 2; triggerShake(5); vibrate(100); 
            triggerMegaPop("SUPER BOMB!!", `+${gainedScore}`, "#facc15");
        } 
        else if (willDestroyAllBlacks) { 
            triggerShake(5); vibrate(100); 
            triggerMegaPop("CRITICAL!!", `+${gainedScore}`, "#f43f5e");
        } 
        else if (isBigBang) { 
            triggerShake(4); vibrate(80); 
            triggerMegaPop(`${clearedCount} LINES!!`, `+${gainedScore}`, "#38bdf8");
        }
        else { 
            triggerShake(1); vibrate(30);
            triggerMegaPop("CLEAR!", `+${gainedScore}`, "#4ade80");
        }
        
        if (blackBlocksDestroyed > 0) gainedScore += (blackBlocksDestroyed * 1000); 

        score += gainedScore; updateScoreDisplay();
        
        let displayMsg = "";
        if (comboCount > 1) { displayMsg += `${comboCount} 連鎖！🔥 `; }
        if (blackBlocksDestroyed > 0) displayMsg += ` 黒ブロック x${blackBlocksDestroyed} `;
        document.getElementById('combo-display').innerText = displayMsg;
        
        canvas.style.backgroundColor = hasGoldTrigger ? "#facc15" : (willDestroyAllBlacks ? "#f43f5e" : "#fff"); 
        setTimeout(() => canvas.style.backgroundColor = "#020617", 150);

        await new Promise(resolve => setTimeout(resolve, 300)); applyGravity(); drawBoard();
        await new Promise(resolve => setTimeout(resolve, 200)); await processChains(comboCount);
    } else { 
        if(comboCount === 0) document.getElementById('combo-display').innerText = ""; 
        saveLocalState();
        spawnPiece(); 
    }
}

function applyGravity() { for (let c = 0; c < COLS; c++) { let emptyRow = ROWS - 1; for (let r = ROWS - 1; r >= 0; r--) { if (board[r][c] !== 0) { if (r !== emptyRow) { board[emptyRow][c] = board[r][c]; board[r][c] = 0; } emptyRow--; } } } }
function triggerShake(level) { let wrapper = document.getElementById('canvas-wrapper'); wrapper.classList.remove('shake-animation'); void wrapper.offsetWidth; wrapper.style.animationDuration = (0.2 + level*0.1) + 's'; wrapper.classList.add('shake-animation'); }
function drop() { if (!canOperate || isGameOver) return; if (!collideAt(currentPiece.x, currentPiece.y + 1, currentPiece.shape)) { currentPiece.y++; update(); } else { canOperate = false; merge(); processChains(); } }
function update() { drawBoard(); drawGhost(); drawPiece(); }

function moveLeft() { if (canOperate && !isGameOver && !collideAt(currentPiece.x - 1, currentPiece.y, currentPiece.shape)) { currentPiece.x--; update(); vibrate(5);} }
function moveRight() { if (canOperate && !isGameOver && !collideAt(currentPiece.x + 1, currentPiece.y, currentPiece.shape)) { currentPiece.x++; update(); vibrate(5);} }
function dropOne() { if (canOperate && !isGameOver) { drop(); vibrate(5);} }
function rotatePiece() { if (!canOperate || isGameOver) return; const newShape = currentPiece.shape[0].map((_, i) => currentPiece.shape.map(row => row[i]).reverse()); if (!collideAt(currentPiece.x, currentPiece.y, newShape)) { currentPiece.shape = newShape; update(); vibrate(10);} }
function hardDrop() { if (!canOperate || isGameOver) return; while (!collideAt(currentPiece.x, currentPiece.y + 1, currentPiece.shape)) { currentPiece.y++; } canOperate = false; merge(); processChains(); vibrate(20);}

function saveAndQuitGame() {
    if(isGameOver || board.length === 0) return;

    gameState = 'GAMEOVER';

let cachedRankingHTML = '';
let lastRankingFetchTime = 0;

async function loadRanking() {
    const displayLevel = document.getElementById('level').value;
    const boardEl = document.getElementById('ranking-list');
    
    if (!db) { boardEl.innerHTML = '<div style="text-align:center; color:#e11d48; padding:10px;">※Firebase未設定</div>'; return; }
    
    let now = Date.now();
    if (cachedRankingHTML !== '' && (now - lastRankingFetchTime < 5 * 60 * 1000)) {
        boardEl.innerHTML = cachedRankingHTML;
        return;
    }

    boardEl.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:10px;">読み込み中...</div>';

    try {
        const querySnapshot = await db.collection(`ranks_level_${displayLevel}`).orderBy("score", "desc").limit(10).get();
        let html = ''; 
        let rankCounter = 0; 
        
        querySnapshot.forEach((doc) => { 
            const r = doc.data(); 
            let rankStyle = '';
            let rankLabel = `${rankCounter + 1}位`;
            
            if(rankCounter === 0) { rankStyle = 'color: #facc15; font-size: 1.2em; font-weight: 900;'; rankLabel = '🥇 1位'; }
            else if(rankCounter === 1) { rankStyle = 'color: #cbd5e1; font-size: 1.1em; font-weight: bold;'; rankLabel = '🥈 2位'; }
            else if(rankCounter === 2) { rankStyle = 'color: #b45309; font-size: 1.1em; font-weight: bold;'; rankLabel = '🥉 3位'; }
            else { rankStyle = 'color: #e2e8f0;'; }

            const displayScore = Number(r.score).toLocaleString();
            
            html += `<div class="rank-item" style="${rankStyle}">
                        <span class="rank-pos">${rankLabel}</span>
                        <span class="rank-name">${r.name}</span>
                        <span class="rank-score">${displayScore} 点</span>
                     </div>`; 
            
            rankCounter++;
        });
        
        if(html === '') { 
            html = `<div style="text-align:center; color:#fb7185; padding:20px 10px; line-height:1.5;">
                        まだ記録がありません<br>
                        <span style="font-size:16px; font-weight:bold; color:#facc15;">最初のトップ10になろう！</span>
                    </div>`; 
        }
        
        boardEl.innerHTML = html;
        cachedRankingHTML = html;
        lastRankingFetchTime = now;
        
    } catch (error) { 
        console.error(error);
        boardEl.innerHTML = '<div style="text-align:center; color:#e11d48; padding:10px;">ランキング取得エラー</div>'; 
    }
}

async function checkRanking(finalScore) {
    if (finalScore === 0 || !db) return;
    const querySnapshot = await db.collection(`ranks_level_${currentPlayedLevel}`).orderBy("score", "desc").limit(10).get();
    let ranks = []; querySnapshot.forEach(doc => ranks.push(doc.data()));
    if (ranks.length < 10 || finalScore > ranks[ranks.length - 1].score) {
        document.getElementById('dq-modal').classList.remove('hidden'); document.getElementById('dq-name').value = '';
    }
}

function saveNameRecord() {
    let name = document.getElementById('dq-name').value || 'ゆうしゃ';
    if(db) {
        db.collection(`ranks_level_${currentPlayedLevel}`).add({ name: name, score: finalScoreToSave, timestamp: new Date() }).then(() => {
            document.getElementById('dq-modal').classList.add('hidden'); 
            cachedRankingHTML = ''; 
            loadRanking(); 
        }).catch(e=>{});
    }
}

        el.href = sp.url;

            el.innerHTML = `

            let label = document.createElement('div');
            label.className = 'sponsor-label';
            label.innerText = '広告';
            el.appendChild(label);
            let img = document.createElement('img');
            img.src = sp.image;
            img.alt = "Sponsor";
            el.appendChild(img);
        }
        
        el.addEventListener('click', () => {

                    firebase.analytics().logEvent('sponsor_click', { sponsor_url: sp.url });
                }
            } catch(e){}
        });
        
        container.appendChild(el);
    }
    currentSponsorIdx = (currentSponsorIdx + slots) % sponsors.length;
}
